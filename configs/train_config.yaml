# MCAQ-YOLO Training Configuration
# Every key below is consumed by mcaq_yolo.train.Trainer — keys not listed
# here are ignored. Loss weights (lambda1-4) follow the paper's Table X
# schedule inside CurriculumScheduler and are not set from this file.

# Model settings
model:
  name: yolov8n        # Ultralytics model variant
  teacher_path: yolov8n.pt  # FP32 teacher for knowledge distillation
  num_classes: 80

# Dataset settings - YOLOv8 format
data:
  # YOLOv8 dataset yaml (contains path / train / val / names)
  yaml_path: /path/to/dataset.yaml
  train: images/train  # Relative to the dataset root in the yaml
  val: images/val

  img_size: 640
  num_workers: 8

# Training hyperparameters
epochs: 300
batch_size: 16
learning_rate: 0.001

# Quantization settings
quantization:
  min_bits: 2
  max_bits: 8
  target_bits: 4.0
  grid_size: 8          # tiles per spatial dimension (paper Sec IV-D)
  bit_mapping: mlp      # 'mlp' (Eq.13-17) | 'linear' (paper's ablation)
  normalize_complexity: false  # per-image percentile-normalize C before mapping

# Curriculum learning (3-stage schedule, paper Fig.3 / Algorithm 3)
curriculum:
  enabled: true
  warmup_epochs: 20     # Stage 1 boundary (paper Table X: Twarm = 20)
  transition_epochs: 50 # Stage 2 boundary (paper Fig.3)
  initial_complexity: 0.2
  initial_temperature: 10.0
  lambda_smooth: 0.1    # Table X lambda2; scale down for finer grids

# Knowledge distillation
distillation:
  enabled: true

# Optimizer settings
optimizer:
  type: adamw
  weight_decay: 0.05
  betas: [0.9, 0.999]

# Learning rate scheduler
scheduler:
  type: cosine
  warmup_epochs: 5      # LR warmup (distinct from the curriculum's Twarm)
  eta_min: 0.000001

# Training settings
training:
  amp: true  # Mixed precision training

# Hardware settings
device: cuda
output_dir: outputs
