name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only torch, then project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt -r requirements-dev.txt

      # CPU runner: the CUDA kernel parity test self-skips; the end-to-end
      # test downloads yolov8n.pt (~6 MB) on first run.
      - name: Run smoke tests
        run: python -m pytest mcaq_yolo/tests/test_smoke.py -v
